name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - frontend
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo (packages & workspace config)
        uses: actions/checkout@v4
        with:
          repository: Firlans/my-monorepo
          path: .

      - name: Checkout app (finance-app)
        uses: actions/checkout@v4
        with:
          ref: frontend
          path: apps/finance-app

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build @packages/components (CSS)
        run: pnpm --filter @packages/components build:css

      - name: Build app
        run: pnpm --filter frontend build
        env:
          NODE_ENV: production
          VITE_BACKEND_SERVICE: ${{ secrets.VITE_BACKEND_SERVICE }}
          VITE_GITHUB_API: ${{ secrets.VITE_GITHUB_API }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp apps/finance-app/dist/index.html apps/finance-app/dist/404.html

      - name: Push dist to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/finance-app/dist
          publish_branch: main
          force_orphan: true
